<!DOCTYPE html>
    <!--make sure that you look at cover count and then count down 1, that is the id
    PAY ATTENTION! also make sure to search for a cover in the search bar to make sure it's been done or not-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Cover Archive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="wrapper">
    <header>
      <a href="./" style="color: white"><h1>The Cover Archive</h1></a>
      <input id="searchBar"
             type="text"
             placeholder="Search games, consoles, creators..." />
    </header>

    <nav id="sidebar-left">
      <h2>Filter by Console</h2>
      <div id="consoles"></div>
      <h2>Browse A‑Z</h2>
      <div id="letters"></div>
    </nav>

    <main id="mainView">
      <!-- Content injected by JS -->
    </main>

    <aside id="sidebar-right">
      <h2>Site Stats</h2>
      <div id="stats"></div>
      <h2>Recent Games</h2>
      <ul id="recentList"></ul>
      <button id="btnRandom">Random Game</button>
    </aside>
  </div>

  <div id="filters" class="hidden" >
    <label>Console:
      <select id="consoleFilter"><option>All</option></select>
    </label>
    <label>Letter:
      <select id="letterFilter"><option>All</option></select>
    </label>
  </div>

  <div id="variant-preview" style="display:none;"></div>

  <script src="app.js"></script>
</body>
</html>
